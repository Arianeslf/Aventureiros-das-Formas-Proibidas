<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Aventureiros das Formas Proibidas.</title>
    <link rel="stylesheet" href="assets/css/cubo.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Bangers&family=Chewy&family=Luckiest+Guy&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <main class="container flex">
      <div class="forma">
        <a href="index.html" class="btn-voltar">← Voltar</a>
        <h1>Cubo</h1>
        <img src="/assets/imagens/cubo.png" alt="circulo" />

        <div class="calculos">
          <div class="formula-first">
            <div class="topo">Área da Face</div>
            <div class="conteudo">
              <p class="formula">A = a²</p>
              <div class="linha"></div>
              <input type="text" placeholder="Digite a aresta" id="arestaA" />
              <button onclick="areaFace()">Calcular</button>
            </div>
          </div>

          <div class="formula-second">
            <div class="topo">Volume do Cubo</div>
            <div class="conteudo">
              <p class="formula">V=a³</p>
              <div class="linha"></div>
              <input type="text" placeholder="Digite a aresta" id="arestaV" />
              <button onclick="volume()">Calcular</button>
            </div>
          </div>

          <div class="formula-three">
            <div class="topo">Área Total</div>
            <div class="conteudo">
              <p class="formula">At = 6a²</p>
              <div class="linha"></div>
              <input type="text" placeholder="Digite a aresta" id="arestaAT" />
              <button onclick="areaTotal()">Calcular</button>
            </div>
          </div>
        </div>
      </div>
      <div class="caixa-resultado">
        <h2>Resultado</h2>
        <p id="tipoResultado">Aqui vai aparecer o cálculo ✨</p>
        <div id="valorResultado">--</div>
      </div>
    </main>
    <script src="assets/js/script.js"></script>
  </body>
</html>
