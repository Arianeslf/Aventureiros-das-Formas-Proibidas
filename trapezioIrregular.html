<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Aventureiros das Formas Proibidas.</title>
    <link rel="stylesheet" href="assets/css/trapezioIrr.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Bangers&family=Chewy&family=Luckiest+Guy&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <main class="container flex">
      <div class="forma">
        <a href="index.html" class="btn-voltar">← Voltar</a>
        <h1>Trapézio Irregular</h1>
        <img src="/assets/imagens/TrapezioIrregular.png" alt="circulo" />

        <div class="calculos">
          <div class="formula-first">
            <div class="topo">Área</div>
            <div class="conteudo">
              <p class="formula">A = ((B · b) .h) / 2</p>
              <div class="linha"></div>
              <input type="text" placeholder="Base maior" id="basemaior" />
              <input type="text" placeholder="Base menor" id="basemenor" />
              <input type="text" placeholder="Altura" id="alturaTI" />
              <button onclick="areaTrapezio()">Calcular</button>
            </div>
          </div>

          <div class="formula-second">
            <div class="topo">Perímetro</div>
            <div class="conteudo">
              <p class="formula">P =B + b + l1 + l2</p>
              <div class="linha"></div>
              <input type="text" placeholder="Base maior" id="basemaiorP" />
              <input type="text" placeholder="Base menor" id="basemenorP" />
              <input
                type="text"
                placeholder="lado esquerdo"
                id="ladoesquerdo"
              />
              <input type="text" placeholder="lado direito" id="ladodireito" />
              <button onclick="PerimetroTrapezio()">Calcular</button>
            </div>
          </div>

          <div class="formula-three">
            <div class="topo">Média das bases</div>
            <div class="conteudo">
              <p class="formula">M = (B + b) / 2</p>
              <div class="linha"></div>
              <input type="text" placeholder="Base maior" id="basemaiorM" />
              <input type="text" placeholder="Base menor" id="basemenorM" />
              <button onclick="MediaTrapezio()">Calcular</button>
            </div>
          </div>
        </div>
      </div>
      <div class="caixa-resultado">
        <h2>Resultado</h2>
        <p id="tipoResultado">Aqui vai aparecer o cálculo ✨</p>
        <div id="valorResultado">--</div>
      </div>
    </main>
    <script src="assets/js/script.js"></script>
  </body>
</html>
